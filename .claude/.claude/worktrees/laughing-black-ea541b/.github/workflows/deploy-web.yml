name: Deploy web to Cloudflare

# Auto-deploy the Next.js app in web/ to Cloudflare Workers on every push to
# master that touches web/. Requires a repo secret CLOUDFLARE_API_TOKEN
# (Workers Scripts: Edit). The account id lives in web/wrangler.jsonc.
on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext → Cloudflare)
        run: npx opennextjs-cloudflare build

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
